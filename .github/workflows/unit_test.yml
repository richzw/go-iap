on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
name: unit test
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24', '1.25' ]
    name: Go ${{ matrix.go }} test
    steps:
      - uses: actions/checkout@v6

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: test
        run: go test -v -race ./...
